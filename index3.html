<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOMATED TELLER MACHINE</title>
 <link rel="stylesheet" href="style3.css">
</head>
<body>
    <div class= "container">
<h1> ATM MACHINE </h1>
<p class="welcome">
Welcome!
 Please insert your ATM card to continue.
</p>
<div class="card-section">
<h2>Insert Your Card Here!</h2>
<button id = "insertCard">  
    Insert Card
</button>
</div>
<div class="login-form">
<form id="loginForm" >
<label for="pin">Enter Pin</label>
<input
type="password"
id="pin"
placeholder="Enter a four digit pin"
maxlength="4">
<button id="submitBtn" type="submit">
    Submit
</button>
   
</form>
</div>
<p id="status">
Please insert your ATM card.
</p>
    </div>
    <script src ="script3.js"></script>
</body>
</html>
