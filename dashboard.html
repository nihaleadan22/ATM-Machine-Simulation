<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
<h1 > ATM Dashboard</h1>
<div class="container">
<div class="welcome-section">
<h2>Welcome!</h2>
<p id="welcomeMessage">
Select an option from the ATM menu below.
</p>
</div>

<div class="balance-section">
<h2>Account Balance</h2>    
<p id="balanceAmount">
Rs. 50,000
</p>
</div>
<div class="transaction-section">
<input
type="number"
id="amount"
placeholder="Enter Amount"
step="1"
min="1"
max="500">
<button id="confirmBtn">
Confirm
</button>
</div>

<div class="menu-section">
 <h2>ATM Menu</h2>
<button id="checkBalance">
        Check Balance
    </button>
<button id="depositMoney">
        Deposit Money
    </button>
<button id="withdrawMoney">
        Withdraw Money
    </button>
<button id="changePin">
        Change PIN
    </button>
<button id="exit">
        Exit
    </button>
<button id="historyBtn">
    Transaction History
</button>
<div class="history-section">
    <h2>Transaction History</h2>
<ul id="transactionList"></ul>
</div>
<div class="status-section">
    <h2>Status</h2>
    <p id="status">
        Please select an option
    </p>
</div>
<script src="dashboard3s.js"></script>
</body>
</html>
